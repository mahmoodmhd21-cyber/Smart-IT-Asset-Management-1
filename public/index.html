<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Smart IT Asset Management</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Main login area keeps the form centered on the page. -->
  <main class="login-page">
    <section class="card login-card" aria-labelledby="login-title">
      <!-- Company logo: replace the text mark with an image when the final logo is available. -->
      <div class="company-logo" aria-label="Smart IT Asset Management">
        <span class="logo-mark">SI</span>
        <span class="logo-text">Smart IT Asset Management</span>
      </div>

      <!-- Page heading shown above the login form. -->
      <div class="login-header">
        <h1 id="login-title">Login</h1>
        <p>Access your asset management dashboard.</p>
      </div>

      <!-- Login form: JavaScript handles validation and API submission. -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="name@company.com"
            aria-describedby="emailError"
            required
          >
          <!-- Email validation messages appear here. -->
          <p class="error-message" id="emailError"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            aria-describedby="passwordError"
            required
          >
          <!-- Password validation messages appear here. -->
          <p class="error-message" id="passwordError"></p>
        </div>

        <!-- Allows users to check their password before submitting. -->
        <label class="show-password">
          <input type="checkbox" id="showPassword">
          <span>Show password</span>
        </label>

        <!-- General login errors from the server appear here. -->
        <p class="error-message form-error" id="formError" role="alert"></p>

        <button type="submit" class="button login-button" id="loginButton">Login</button>
      </form>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
